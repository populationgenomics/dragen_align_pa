# Mackenzie Agilent CRE (Clinical Research Exome v1) batch.
# Layers on top of dragen_align_pa_defaults.toml when submitted via analysis-runner.

[workflow]
sequencing_type = "exome"
input_cohorts = ["COH12414"]  # mackenzie-exome-cre-20260515-dragen

# Only Regions is in ICA_FILE_IDS for CRE today (no Covered yet).
# All three DRAGEN target slots use the same BED.
[dragen_align_pa.manage_dragen_pipeline.presets.exome.bed_names]
vc_target = "S06588914_Regions_hg38.bed"
cnv_target = "S06588914_Regions_hg38.bed"
sv_call_regions = "S06588914_Regions_hg38.bed"
